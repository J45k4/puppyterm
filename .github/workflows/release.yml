name: Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: PuppyTerm-macos-aarch64.zip
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: PuppyTerm-macos-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: PuppyTerm-linux-x86_64.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: PuppyTerm-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    env:
      PUPPYTERM_BUILD_TAG: ${{ github.ref_name }}
      UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked

      - name: Package release (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/package_release.sh
          scripts/package_release.sh "${{ matrix.target }}" dist

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/package_release.ps1 -Target "${{ matrix.target }}" -OutDir "dist"

      - name: Sign packaged archive
        shell: bash
        run: |
          cargo run --quiet --bin sign_update -- "$UPDATE_SIGNING_KEY" "dist/${{ matrix.artifact }}" "dist/${{ matrix.artifact }}.sig"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sig

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Validate signed assets
        run: |
          test -f release-assets/PuppyTerm-macos-aarch64.zip
          test -f release-assets/PuppyTerm-macos-aarch64.zip.sig
          test -f release-assets/PuppyTerm-macos-x86_64.zip
          test -f release-assets/PuppyTerm-macos-x86_64.zip.sig
          test -f release-assets/PuppyTerm-linux-x86_64.zip
          test -f release-assets/PuppyTerm-linux-x86_64.zip.sig
          test -f release-assets/PuppyTerm-windows-x86_64.zip
          test -f release-assets/PuppyTerm-windows-x86_64.zip.sig

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
